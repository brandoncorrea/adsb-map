# Cloud-host deployment for the adsb app.
#
# The app runs internet-facing in the cloud behind the Caddy `proxy` sidecar
# (TLS + security headers, adsb-kh4.4) and reaches the HOME ultrafeeder over a
# tunnel (epic adsb-kh4).
#
#   docker compose build      # build the image from ./Dockerfile
#   docker compose up -d       # run app + proxy
#   docker compose logs -f app
#
# Config is environment-only. Set values in a local `.env` next to this file
# (compose auto-loads it) or export them in the shell — never bake secrets or
# host addresses into the image.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: adsb:latest
    restart: unless-stopped
    # NO published ports — deliberately (adsb-kh4.4). The app speaks plain
    # HTTP and enforces nothing at the transport; the ONLY way in from the
    # internet is the `proxy` service below, which terminates TLS and sets
    # the security headers. Publishing 8280 here would reopen the
    # unauthenticated plaintext side door AND make the app's trust in
    # X-Forwarded-For (below) forgeable.
    environment:
      # PORT the JVM binds inside the container (the proxy dials app:8280).
      PORT: "8280"

      # SSE connection limits (adsb.stream.broadcast, adsb-kh4.4). The stream
      # is anonymous and internet-facing; these bound what strangers can hold
      # open. Defaults shown; at the cap a new connect gets 503 + Retry-After.
      ADSB_SSE_MAX_CLIENTS: "${ADSB_SSE_MAX_CLIENTS:-100}"
      ADSB_SSE_MAX_PER_IP: "${ADSB_SSE_MAX_PER_IP:-4}"

      # Honor the proxy-appended X-Forwarded-For for the per-IP limit. Safe
      # HERE because the app has no published port — every connection
      # provably came through Caddy, which overwrites any client-supplied
      # XFF with the real client IP. Set to "false" if you ever publish the
      # app port directly (and then don't do that on the internet).
      ADSB_TRUST_FORWARDED_FOR: "true"

      # The home ultrafeeder, reached over the Cloudflare Tunnel (adsb-kh4.3).
      # This is the PUBLIC hostname of the tunnel — cloudflared runs on the HOME
      # network, not here (see the note below) — so it is an https:// URL and
      # the app authenticates to it with the service-token headers below.
      # e.g. https://feeder.bwawan.com
      ADSB_ULTRAFEEDER_URL: "${ADSB_ULTRAFEEDER_URL:-https://feeder.bwawan.com}"

      # Cloudflare Access service token — the credential the app presents on
      # EVERY feeder request (aircraft.json AND receiver.json) so the tunnel's
      # Access policy lets the poll through. Set BOTH or NEITHER: half a
      # credential fails the boot loudly. Leave both empty for a trusted-LAN
      # feeder with no Access policy. NEVER commit real values — put them in a
      # local .env (git-ignored) or the host's secret store. See the runbook in
      # README.md → Deployment → "Cloud-to-home feeder tunnel".
      ADSB_FEEDER_AUTH_ID: "${ADSB_FEEDER_AUTH_ID:-}"
      ADSB_FEEDER_AUTH_SECRET: "${ADSB_FEEDER_AUTH_SECRET:-}"

      # Receiver position for the range gate + max-range stat. Optional: without
      # it the app falls back to the feeder's receiver.json, else disables the
      # gate. Kept out of the image; supply per-deployment.
      ADSB_RECEIVER_LAT: "${ADSB_RECEIVER_LAT:-}"
      ADSB_RECEIVER_LON: "${ADSB_RECEIVER_LON:-}"

      # Ingest source. Leave unset for the live ultrafeeder. Set to "replay" to
      # serve the recorded fixture with NO feeder required — handy for a smoke
      # test of the deployment before the tunnel exists.
      ADSB_SOURCE: "${ADSB_SOURCE:-}"

      # Extra JVM flags (heap, GC, etc.) if needed.
      JAVA_OPTS: "${JAVA_OPTS:-}"
    # The image already declares a HEALTHCHECK (wget /healthz); compose inherits
    # it. Override here only if you need different timings.

  # ───────────────────────────────────────────────────────────────────────────
  # TLS edge (adsb-kh4.4): Caddy terminates HTTPS with automatic Let's
  # Encrypt certificates and applies the security headers (CSP, HSTS, …).
  # Everything about WHAT it serves — headers, SSE flush, the do-not-proxy-
  # the-feeder rule — lives in ./Caddyfile; read it before changing this.
  #
  # Works with Cloudflare DNS proxied (orange cloud → set SSL mode to
  # "Full (strict)") or DNS-only; details in the Caddyfile header comment.
  # ───────────────────────────────────────────────────────────────────────────
  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      # The ONLY internet-facing ports in this deployment.
      - "80:80"     # ACME HTTP-01 + redirect to HTTPS
      - "443:443"   # HTTPS
      - "443:443/udp"  # HTTP/3
    environment:
      # The public hostname Caddy answers (and gets a certificate) for.
      ADSB_DOMAIN: "${ADSB_DOMAIN:-map.bwawan.com}"
      # ACME account email for certificate expiry warnings. Must be
      # non-empty — an empty value would feed Caddy a bare `email` directive.
      ACME_EMAIL: "${ACME_EMAIL:-bwancor@gmail.com}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Certificates + ACME account state. Persist them or every restart
      # re-issues against Let's Encrypt rate limits.
      - caddy-data:/data
      - caddy-config:/config

  # ───────────────────────────────────────────────────────────────────────────
  # No cloudflared sidecar here — by design (adsb-kh4.3).
  #
  # The direction of the tunnel is the whole point: the CLOUD backend reaches
  # the HOME feeder, and the feeder must be reachable from nowhere else. So
  # cloudflared runs on the HOME network (next to the ultrafeeder), exposing
  # dietpi:8100 as a private hostname (feeder.bwawan.com) that only the
  # Cloudflare edge can reach — no home port is ever forwarded. That hostname
  # is gated by a Cloudflare Access "Service Auth" policy, so it is NOT
  # publicly readable: a request without the service token gets a 403.
  #
  # This cloud-side `app` is just an HTTPS client of that hostname. It needs no
  # tunnel of its own; it points ADSB_ULTRAFEEDER_URL at feeder.bwawan.com and
  # presents the ADSB_FEEDER_AUTH_ID / ADSB_FEEDER_AUTH_SECRET service token on
  # every request. A downed tunnel therefore looks exactly like a feeder
  # outage — the poll loop backs off and the UI shows the feeder as unhealthy.
  #
  # Standing up the home-side tunnel + Access policy is operational work on the
  # Overseer's Cloudflare account (go-live: adsb-kh4.6). The full step-by-step
  # is in README.md → Deployment → "Cloud-to-home feeder tunnel".
  # ───────────────────────────────────────────────────────────────────────────

volumes:
  caddy-data:
  caddy-config:
