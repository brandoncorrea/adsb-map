<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- The chart ships in two printed editions (docs/design-direction.md):
         declaring both lets the UA match form controls and scrollbars to
         the edition prefers-color-scheme selects. -->
    <meta name="color-scheme" content="light dark" />
    <title>adsb — live aircraft</title>
    <!-- MapLibre GL CSS, vendored locally (no CDN, no token) so the map
         canvas and attribution control lay out correctly in dev. -->
    <link rel="stylesheet" href="/maplibre-gl.css" />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <!-- Mount point. adsb.core/init! renders the shell here. -->
    <div id="app"></div>
    <script src="/js/main.js"></script>
  </body>
</html>
