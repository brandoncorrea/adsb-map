<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- viewport-fit=cover is what makes env(safe-area-inset-*) non-zero
         on notched phones; without it the UA letterboxes and chrome
         cannot clear the home indicator / notch. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- The chart ships in two printed editions (docs/design-direction.md):
         declaring both lets the UA match form controls and scrollbars to
         the edition prefers-color-scheme selects. -->
    <meta name="color-scheme" content="light dark" />
    <!-- The B is load-bearing: ADS-B, the protocol, and bwawan, the person
         whose yard the antenna is in. No " — subtitle" after it: that
         convention exists to say WHICH page of a site you are on, and there
         is only one page. -->
    <title>ADS-Bwawan</title>
    <!-- MapLibre GL CSS, vendored locally (no CDN, no token) so the map
         canvas and attribution control lay out correctly in dev. -->
    <link rel="stylesheet" href="/maplibre-gl.css" />
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <!-- Mount point. adsb.core/init! renders the shell here. -->
    <div id="app"></div>
    <!-- Cold-load splash. Static, and a SIBLING of #app so React never wipes
         it: a first-time reader waits on the JS bundle, the basemap style, and
         the first tile, and a Reagent component cannot cover its own download.
         So this paints from first frame (app.css is render-blocking in <head>,
         which dresses #adsb-splash before it is seen) and adsb.ui.splash tears
         it out once the map's first frame lands. -->
    <div id="adsb-splash" role="status" aria-live="polite">
      <div class="adsb-splash-note">Tuning in&hellip;</div>
    </div>
    <script src="/js/main.js"></script>
  </body>
</html>
