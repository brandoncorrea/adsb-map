# DigitalOcean App Platform spec (adsb-9n6).
#
#   doctl apps create --spec .do/app.yaml         # first deploy
#   doctl apps update <app-id> --spec .do/app.yaml
#
# This is the ONLY deployment (adsb-kh4.7 retired the compose + Caddy path — it
# was config for a droplet nobody was going to provision, and an untested second
# source of truth for the numbers below). App Platform builds the Dockerfile on
# its own build infrastructure, runs the one container, terminates TLS, and
# routes to it. So:
#
#   * there is no edge we control. Every security header the app needs it sets
#     ITSELF (adsb.http.security) — CSP, HSTS, nosniff, Referrer-Policy,
#     Permissions-Policy — which is what makes it safe to deploy behind a router
#     whose config is not ours to write.
#   * the container is not reachable except through DigitalOcean's router, which
#     is what makes ADSB_TRUST_FORWARDED_FOR=true correct below. Read the note
#     on ADSB_TRUSTED_PROXY_HOPS before believing the per-IP cap works.
#   * the build never runs on the 512 MB instance. That matters: `bb build` runs
#     shadow-cljs release, a JVM compiling ClojureScript, which wants far more
#     memory than the thing it produces needs to run.
#
# Secrets (the feeder service token) are NOT in this file. Set them as
# encrypted app-level secrets, either in the control panel or with
# `doctl apps update <id> --spec` against a spec whose values you have replaced.
# A committed spec with a real CF-Access secret in it is a leaked credential.

name: adsb-map
region: nyc

services:
  - name: web
    dockerfile_path: Dockerfile
    source_dir: /

    github:
      repo: brandoncorrea/adsb-map
      branch: master
      deploy_on_push: true

    # 512 MB / 1 vCPU. The app's resident set is dominated by the JVM's fixed
    # costs (metaspace, code cache, thread stacks), not by the picture, which is
    # under a megabyte; the Dockerfile's JAVA_OPTS size the JVM for exactly this
    # box. 1 vCPU is not a constraint: the broadcast tick serializes ONE frame
    # per second and hands the same string to every client
    # (adsb.stream.broadcast/broadcast!), so fan-out is a socket write, not an
    # encode, per client.
    instance_size_slug: basic-xxs
    instance_count: 1

    # Matches the Dockerfile's EXPOSE / PORT. App Platform injects PORT to match,
    # and adsb.main reads it.
    http_port: 8280

    health_check:
      http_path: /healthz
      # /healthz is liveness of THIS process and is always 200 while the JVM
      # serves; the feeder's health is reported in the BODY, never conflated
      # with the status (adsb.http.handlers/health). So a feeder outage must not
      # cause App Platform to kill and redeploy the container — and it won't,
      # because this only ever reads the status code.
      initial_delay_seconds: 40
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    envs:
      # ── The stream ──────────────────────────────────────────────────────────
      # Anonymous, internet-facing, and long-lived. These bound what strangers
      # can hold open (adsb.stream.broadcast). At the cap a new connect gets
      # 503 + Retry-After.
      - key: ADSB_SSE_MAX_CLIENTS
        scope: RUN_TIME
        value: "100"
      - key: ADSB_SSE_MAX_PER_IP
        scope: RUN_TIME
        value: "4"

      # ⚠ THE ORIGIN LOCK. Set this or the per-IP cap is decorative (adsb-wrx).
      #
      # App Platform ALSO publishes this app on its own *.ondigitalocean.app
      # hostname, which bypasses Cloudflare entirely — measured against the live
      # deployment, that hostname answered strangers with 200 and accepted a
      # forged X-Forwarded-For. So "the container is only reachable through our
      # edge" is FALSE by default, and every header-borne claim about who a
      # client is can simply be typed by the client.
      #
      # The fix is a shared secret only Cloudflare knows. In the Cloudflare
      # dashboard, add a Transform Rule (Rules -> Transform Rules -> Modify
      # Request Header) that sets X-Origin-Token to the same value on every
      # request to the origin. This app then 403s anything arriving without it
      # (adsb.http.security/wrap-origin-lock), so the .ondigitalocean.app
      # hostname stops answering strangers and CF-Connecting-IP becomes
      # Cloudflare's word rather than a stranger's.
      #
      # Generate one: openssl rand -hex 32. It is a SECRET — never commit the
      # real value. /healthz is deliberately exempt: App Platform's health check
      # reaches the container directly, not through Cloudflare, and a locked
      # /healthz means a container the platform kills and redeploys forever.
      - key: ADSB_ORIGIN_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME

      # Believe the client address the edge reports, rather than the TCP peer
      # (which, behind any proxy, is the proxy). Sound ONLY because of the
      # origin lock above: without it, this trusts a header a stranger can type.
      - key: ADSB_TRUST_FORWARDED_FOR
        scope: RUN_TIME
        value: "true"

      # A FALLBACK, and no longer the primary mechanism (adsb-nnk).
      #
      # The per-IP cap now keys on CF-Connecting-IP, which Cloudflare sets to a
      # single client address and overwrites if the client sends one. That is
      # deliberate: counting X-Forwarded-For hops was MEASURED against the live
      # deployment and it does not work here. Five concurrent streams from one
      # address, against a cap of four, were all admitted — the chain is
      # browser -> Cloudflare -> DigitalOcean's edge (itself Cloudflare), and
      # the address the last hop appends is drawn from a pool that varies per
      # connection. No hop COUNT can fix that: there is no fixed index at which
      # the client reliably sits.
      #
      # This is consulted only if CF-Connecting-IP is absent — i.e. if the edge
      # someday stops being Cloudflare.
      - key: ADSB_TRUSTED_PROXY_HOPS
        scope: RUN_TIME
        value: "1"

      # ── The feeder ──────────────────────────────────────────────────────────
      # The home ultrafeeder over the Cloudflare Tunnel (adsb-kh4.3). cloudflared
      # runs at HOME, next to the feeder — not here — so this is an https:// URL
      # that the app authenticates to with the service token below.
      - key: ADSB_ULTRAFEEDER_URL
        scope: RUN_TIME
        value: https://adsb.bwawan.com

      # Cloudflare Access service token. Set BOTH or NEITHER — half a credential
      # fails the boot loudly (adsb.ingest.config). SECRET means App Platform
      # encrypts the value at rest and never shows it again; the placeholders
      # below must be replaced at deploy time and never committed with real
      # values in them.
      - key: ADSB_FEEDER_AUTH_ID
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: ADSB_FEEDER_AUTH_SECRET
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME

      # ── Privacy ─────────────────────────────────────────────────────────────
      # The receiver position backs the range gate and the max-range stat. It is
      # SECRET because it is the Overseer's home: the backend keeps it
      # server-side and puts only the scalar max-range on the wire — never the
      # position, never a bearing (adsb.wire, adsb.stats).
      - key: ADSB_RECEIVER_LAT
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME
      - key: ADSB_RECEIVER_LON
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_ME

      # ── Smoke test ──────────────────────────────────────────────────────────
      # Set to "replay" to serve the recorded fixture with NO feeder required.
      # This is how to prove the deployment — and, more to the point, whether SSE
      # survives DigitalOcean's router — before the tunnel exists. Unset for the
      # live feeder.
      # - key: ADSB_SOURCE
      #   scope: RUN_TIME
      #   value: replay

      # ── Client-address diagnostic (adsb-nnk) ─────────────────────────────────
      # TEMPORARY. Behind two Cloudflare layers (our zone in front of DO's own
      # Cloudflare), the per-IP SSE cap keys on CF-Connecting-IP but nobody knows
      # whether the container actually receives the real visitor there or a
      # rotating inner-edge address. Set this to "true", redeploy, open the stream
      # from a KNOWN address, then: doctl apps logs <app-id> --type run | grep
      # SSE-CLIENT-IP-DIAG. It prints socket-peer, x-forwarded-for,
      # cf-connecting-ip, and the resolved key side by side — whichever equals
      # your known address is the one to key on. Self-caps at 20 lines. UNSET IT
      # and redeploy once you have read the logs.
      # - key: ADSB_DIAGNOSE_CLIENT_IP
      #   scope: RUN_TIME
      #   value: "true"

ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
